<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.cdnfonts.com/css/sf-pro-display" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Login to Sparq</title>
</head>
<body>
    <form id="loginForm" onsubmit="return login(event);">
        <h1><span>Login to</span> Sparq!</h1>
        <p>Create an account to enjoy all the services without any ads for free!</p>
        <input id="username" placeholder="Username" type="text" required>
        <input id="email" placeholder="Email" type="text" required>
        <input id="password" placeholder="Password" type="password" required>
        <button type="submit">Sign in</button>
        <p>Already Have An Account? <a href="">Sign In</a></p>
    </form>
</body>
<script src="script.js"></script>
</html>
